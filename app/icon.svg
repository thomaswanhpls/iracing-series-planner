<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#040816"/>

  <!-- 3×3 grid of cells, checkerboard-style, like the track matrix -->
  <!-- Row 1 -->
  <rect x="5"  y="5"  width="6" height="6" rx="1.5" fill="#00e8e0" opacity="0.9"/>
  <rect x="13" y="5"  width="6" height="6" rx="1.5" fill="#ff2d8a" opacity="0.85"/>
  <rect x="21" y="5"  width="6" height="6" rx="1.5" fill="#00e8e0" opacity="0.9"/>

  <!-- Row 2 -->
  <rect x="5"  y="13" width="6" height="6" rx="1.5" fill="#2dd9a8" opacity="0.8"/>
  <rect x="13" y="13" width="6" height="6" rx="1.5" fill="#00e8e0" opacity="0.9"/>
  <rect x="21" y="13" width="6" height="6" rx="1.5" fill="#ff2d8a" opacity="0.85"/>

  <!-- Row 3 -->
  <rect x="5"  y="21" width="6" height="6" rx="1.5" fill="#ff2d8a" opacity="0.85"/>
  <rect x="13" y="21" width="6" height="6" rx="1.5" fill="#2dd9a8" opacity="0.8"/>
  <rect x="21" y="21" width="6" height="6" rx="1.5" fill="#00e8e0" opacity="0.9"/>
</svg>
